<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>SmartKids Emoji test</title>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; }
  .question { margin: 20px 0; }
  .emoji {
    font-size: 70px;
    margin: 10px;
    cursor: pointer;
    border: 3px solid transparent;
    border-radius: 10px;
    display: inline-block;
    width: 90px;
    height: 90px;
    line-height: 90px;
  }
  .selected { border-color: green; }
  button { padding: 10px 20px; margin-top: 20px; }
</style>

<style>
  body {
    font-family: Arial;
    background: #89ace2;
    padding: 20px;
  }
  h1 {
    text-align: center;
  }
  .question {
    background: rgb(243, 232, 232);
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
  }
  button {
    padding: 10px 20px;
    background: #4CAF50;
    color: rgb(18, 15, 15);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
  }
  #result {
    background: rgb(206, 231, 243);
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
  }
</style>

</head>
<body>

<h1>🎮 SmartKids Mini Test</h1>

<!-- Savol 1 -->
<div class="question" id="q1">
  <p>Qaysi rang yoqadi?</p>
  <div class="emoji" onclick="selectOption('q1','A',this)">🔴</div>
  <div class="emoji" onclick="selectOption('q1','B',this)">🔵</div>
  <div class="emoji" onclick="selectOption('q1','C',this)">🟢</div>
</div>

<!-- Savol 2 -->
<div class="question" id="q2">
  <p>Qaysi shakl boshqalardan farq qiladi?</p>
  <div class="emoji" onclick="selectOption('q2','A',this)">🔺</div>
  <div class="emoji" onclick="selectOption('q2','B',this)">🔺</div>
  <div class="emoji" onclick="selectOption('q2','C',this)">⚪</div>
</div>

<!-- Savol 3 -->
<div class="question" id="q3">
  <p>Qaysi hayvon yoqadi?</p>
  <div class="emoji" onclick="selectOption('q3','A',this)">🐶</div>
  <div class="emoji" onclick="selectOption('q3','B',this)">🐱</div>
  <div class="emoji" onclick="selectOption('q3','C',this)">🐸</div>
</div>

<button onclick="showResult()">Natijani ko‘rish</button>

<div id="result"></div>

<script>
let answers = {};

function selectOption(question, option, element) {
  // faqat shu savoldagi emoji larni tozalaydi
  let parent = document.getElementById(question);
  let emojis = parent.querySelectorAll('.emoji');
  emojis.forEach(e => e.classList.remove('selected'));

  // tanlanganini belgilaydi
  element.classList.add('selected');

  // faqat 1 ta javob saqlanadi
  answers[question] = option;
}

function showResult() {

  // agar hamma savol belgilanmagan bo‘lsa
  if(Object.keys(answers).length < 3){
    alert("Iltimos, hamma savollarga javob bering!");
    return;
  }

  let scores = { ijodiy:0, mantiqiy:0, texnik:0 };

  for(let q in answers){
    if(answers[q] === 'A') scores.ijodiy++;
    if(answers[q] === 'B') scores.mantiqiy++;
    if(answers[q] === 'C') scores.texnik++;
  }

  let top = Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

  let career = "";
  if(top==="ijodiy") career="🎨 Dizayner";
  if(top==="mantiqiy") career="💻 Dasturchi";
  if(top==="texnik") career="⚙️ Muhandis";

  document.getElementById("result").innerHTML = 
  `<h2>Sizning qobiliyatingiz: ${top}</h2>` +
    ` <h3>Kasb: ${career}</h3>;`
}
</script>

</body>
</html>
