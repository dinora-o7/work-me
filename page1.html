<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Page 1</title>
<link rel="stylesheet" href="style.css">
<style>
body { margin:0; font-family:sans-serif; overflow:hidden; }
.page {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; justify-content:center; align-items:center;
    background: #398a85; color:#e0e9ed; font-size:2em;
    transition: transform 0.8s ease;
}
</style>
</head>
<body>


<div class="page" id="page1">
    Page 1

    <button onclick="nextPage()">Next</button>
</div>

<script>
function nextPage() {
    // page1 chapga surilib ketadi
    document.getElementById('page1').style.transform = "translateX(-100%)";
    // 0.8s keyin page2 ga o'tish
    setTimeout(() => {
        window.location.href = "page2.html";
    }, 800);
}
</script>


<div class="page">
    <div class="card">
        <center>
      <h1>SmartKids Career</h1>
      <p>Bolalarning salohiyatini erta aniqlash platformasi</p>
  
      <p>
        Biz bolalarning qiziqishi va qobiliyatini aniqlab,
        ularni to‘g‘ri kasbga yo‘naltiramiz.
      </p>
  
      <button onclick="nextPage('page2.html')">Muammo</button>
    </div>
  </div>
</center>

</body>
</html>
